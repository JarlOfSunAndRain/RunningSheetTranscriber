<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/manager.css">
  <link rel="stylesheet" href="styles/transcribe.css">

</head>

        <line x1="7" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <span>Running Sheet Transcriber</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="manager" id="nav-manager">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M3 7V17C3 18.1 3.9 19 5 19H19C20.1 19 21 18.1 21 17V9C21 7.9 20.1 7 19 7H13L11 5H5C3.9 5 3 5.9 3 7Z" />
        </svg>
        Browse
      </button>
      <button class="nav-tab" data-page="transcribe" id="nav-transcribe" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L12 22M12 2L8 6M12 2L16 6" stroke-linecap="round" stroke-linejoin="round" />
          <rect x="4" y="10" width="16" height="10" rx="2" />
        </svg>
        Transcribe
      </button>
      <button class="nav-tab" data-page="review" id="nav-review" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11L12 14L22 4" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" />

      </button>
    </div>

      <div class="nav-status" id="nav-status"></div>

      <button class="btn btn-ghost btn-sm" id="btn-about" title="About" style="padding:6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" stroke-linecap="round"/>
          <line x1="12" y1="8" x2="12.01" y2="8" stroke-linecap="round"/>
        </svg>
      </button>

  <!-- Page Container -->
  <main id="page-container" class="page-container">
    <!-- Pages rendered here by JS -->
  </main>

  <!-- Audio Player Bar (persistent, bottom) -->
  <div id="audio-player-container" class="audio-player-container hidden">
    <!-- Player bar rendered here by AudioPlayer.js -->
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
      <!-- Modal content rendered here -->
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="services/storage.js"></script>
  <script src="services/undoRedo.js"></script>
  <script src="components/modal.js"></script>
  <script src="components/audioPlayer.js"></script>
  <script src="components/tagInput.js"></script>
  <script src="pages/manager.js"></script>
  <script src="pages/transcribe.js"></script>
  <script src="pages/review.js"></script>
  <script src="pages/export.js"></script>
  <script src="app.js"></script>

</html>
